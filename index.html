<!DOCTYPE html>
<html>
<head>
    <title>My E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My E-Commerce Store</h1>

    <div class="product-container">

        <div class="card">
            <h2>Mobile Phone</h2>
            <p>Price: ₹15000</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <h2>Laptop</h2>
            <p>Price: ₹50000</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <h2>Headphone</h2>
            <p>Price: ₹2000</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </div>

    <h2 id="cart">Cart Items : 0</h2>

    <script src="script.js"></script>

</body>
</html>
